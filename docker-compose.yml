services:
  api:
    build:
      context: .
      dockerfile: cmd/api/Dockerfile
    expose:
      - "8080"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      JWT_SECRET: "${JWT_SECRET}"
      OPENAI_TOKEN: "${OPENAI_TOKEN}"
      AI_MODEL_TEXT: "${AI_MODEL_TEXT:-gpt-4o}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      API_PORT: "8080"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  web:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - api
      - web

  db:
    image: mysql:lts
    # No ports exposed to host — only accessible from other containers
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-ai_calories}"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mysql_data:
  caddy_data:
  caddy_config:
